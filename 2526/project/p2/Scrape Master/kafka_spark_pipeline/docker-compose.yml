# ─────────────────────────────────────────────────────────────────────────────
# FUZZ CHANNEL Sentiment Pipeline — Local Dev Stack
# SECP3133 Project 2 · Member 3 (Pipeline & Visualization)
#
# Brings up four single-node services for local development:
#   - Zookeeper (Kafka coordinator)
#   - Kafka     (single broker, plaintext, no auth)
#   - Elasticsearch 8.x (security disabled — DEV ONLY)
#   - Kibana    (matched version)
#
# Usage:
#   docker compose up -d            # start all
#   docker compose ps               # health
#   docker compose logs -f kafka    # follow a service
#   docker compose down -v          # stop + delete volumes
#
# Ports exposed to localhost:
#   9092  → Kafka broker
#   2181  → Zookeeper
#   9200  → Elasticsearch HTTP
#   5601  → Kibana UI (http://localhost:5601)
# ─────────────────────────────────────────────────────────────────────────────

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: hpdp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # ruok is not whitelisted by default; add it so the healthcheck works.
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: hpdp-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: PLAINTEXT for in-network access, PLAINTEXT_HOST for the
      # host (your python producer/Spark consumer talking to localhost:9092)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: hpdp-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false       # DEV ONLY — disables auth + TLS
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - ingest.geoip.downloader.enabled=false
    ulimits:
      memlock: { soft: -1, hard: -1 }
    volumes:
      - es_data:/usr/share/elasticsearch/data   # survive container restarts
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -E 'green|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: hpdp-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5601/api/status | grep -E 'available|green'"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  es_data:        # persistent Elasticsearch data so docker restarts don't wipe
