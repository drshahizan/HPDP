# ============================================================================
# Docker Compose — Full Telecom Sentiment Streaming Pipeline
# ============================================================================
# Spins up: Zookeeper, Kafka, Elasticsearch, Kibana, and the pipeline app.
#
# Usage:
#   docker-compose up -d zookeeper kafka elasticsearch kibana   # infrastructure
#   docker-compose run spark-streaming                           # start consumer
#   docker-compose run kafka-producer                            # start producer
#
# Teardown:
#   docker-compose down -v
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Zookeeper — required by Kafka
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Kafka Broker
  # --------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Internal listener (containers) + External listener (host machine)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --------------------------------------------------------------------------
  # Elasticsearch
  # --------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --------------------------------------------------------------------------
  # Kibana — Dashboard UI
  # --------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.0
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - pipeline-net

  # --------------------------------------------------------------------------
  # Kafka Producer — streams cleaned_data.csv into Kafka
  # --------------------------------------------------------------------------
  kafka-producer:
    build:
      context: ..
      dockerfile: kafka-spark-pipeline/Dockerfile
    container_name: kafka-producer
    depends_on:
      kafka:
        condition: service_healthy
    command: ["python", "kafka_producer.py"]
    volumes:
      - ./logs:/app/logs
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - pipeline-net

  # --------------------------------------------------------------------------
  # Spark Streaming — consumes from Kafka, predicts, writes to ES
  # --------------------------------------------------------------------------
  spark-streaming:
    build:
      context: ..
      dockerfile: kafka-spark-pipeline/Dockerfile
    container_name: spark-streaming
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: ["python", "spark_streaming.py"]
    volumes:
      - ./logs:/app/logs
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ES_HOST=elasticsearch
      - ES_PORT=9200
    networks:
      - pipeline-net

# ============================================================================
# Shared resources
# ============================================================================
volumes:
  es-data:
    driver: local

networks:
  pipeline-net:
    driver: bridge
